<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users — TNP Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/app.css">
    <style>
        #app-layout { display: flex; min-height: 100vh; }
        #sidebar     { width: 256px; flex-shrink: 0; }
        #main-area   { flex: 1; overflow-y: auto; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.4s ease-out both; }

        .nav-link { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:12px;
                    color:#4b5563; font-weight:500; font-size:0.875rem; text-decoration:none;
                    transition:all 0.2s; }
        .nav-link:hover { background:#f5f3ff; color:#8B2A8B; }
        .nav-link.active { background:#f5f3ff; color:#8B2A8B; font-weight:600; }

        .panel-card { background:#fff; border-radius:20px; border:1px solid #f3f4f6; padding:24px;
                      box-shadow:0 4px 6px -1px rgba(0,0,0,0.02); }
    
        @media (max-width: 768px) {
            #sidebar { position: fixed !important; left: -256px; transition: left 0.3s ease; z-index: 100; height: 100vh; box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
            #sidebar.open { left: 0; }
            #mobile-menu-btn { display: block !important; }
            .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
            .mobile-overlay.open { display: block; }
            header { padding: 16px !important; }
            main { padding: 16px !important; }
            .field-grid { grid-template-columns: 1fr !important; }
        }

    </style>
</head>
<body style="background:#f9fafb; font-family:Inter,system-ui,sans-serif;">

<div id="app-layout">
    <!-- ═══ Sidebar ═══ -->
    <aside id="sidebar" style="background:#fff; border-right:1px solid #f3f4f6; display:flex; flex-direction:column;">
        <div style="padding:24px; border-bottom:1px solid #f3f4f6;">
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="../assets/img/iiitm-logo.png" alt="IIIT Manipur"
                     style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                <div>
                    <div style="font-size:0.875rem; font-weight:700; color:#1f2937;">TNP Portal</div>
                    <div style="font-size:0.75rem; color:#6b7280;">Admin Panel</div>
                </div>
            </div>
        </div>

        <nav style="flex:1; padding:16px; display:flex; flex-direction:column; gap:4px;">
            <a href="dashboard.html"           class="nav-link">📊 <span>Dashboard</span></a>
            <a href="sessions.html"            class="nav-link">🗓️ <span>Sessions</span></a>
            <a href="announcements.html"       class="nav-link">📢 <span>Announcements</span></a>
            <a href="users.html"               class="nav-link active">👥 <span>Users</span></a>
        </nav>

        <div style="padding:16px; border-top:1px solid #f3f4f6;">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                <div id="avatar" style="width:32px; height:32px; border-radius:50%; background:#f5f3ff;
                     display:flex; align-items:center; justify-content:center;
                     font-weight:700; font-size:0.875rem; color:#8B2A8B;">A</div>
                <div style="flex:1; min-width:0;">
                    <div id="sidebar-email" style="font-size:0.8125rem; font-weight:500; color:#1f2937;
                          white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
                    <div style="font-size:0.75rem; color:#6b7280;">Administrator</div>
                </div>
            </div>
            <button onclick="Auth.logout()"
                    style="width:100%; display:flex; align-items:center; gap:10px; padding:10px 16px;
                           border-radius:12px; background:none; border:none; cursor:pointer;
                           color:#ef4444; font-size:0.875rem; font-weight:500;
                           transition:background 0.2s;"
                    onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background='none'">
                🚪 <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ═══ Main ═══ -->
    <div id="main-area">
        <header style="background:#fff; border-bottom:1px solid #f3f4f6; padding:16px 32px;
                        display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10;">
            <div style="display:flex; align-items:center;">
                <button id="mobile-menu-btn" style="display:none; background:none; border:none; font-size:1.5rem; cursor:pointer; margin-right:16px; padding:0;" onclick="toggleSidebar()">☰</button>
                <h1 style="font-size:1.25rem; font-weight:600; color:#1f2937; margin:0;">User Management</h1>
            </div>
            <button onclick="openCoordinatorModal()" class="btn-primary" style="width:auto; padding:8px 16px; font-size:0.875rem;">
                + Add Coordinator
            </button>
        </header>

        <main style="padding:32px; max-width:1200px; margin:0 auto;" class="fade-in">
            <div class="panel-card">
                
                <!-- Filter Controls -->
                <div style="display:flex; gap:16px; margin-bottom:24px; align-items:center; flex-wrap:wrap;">
                    <div>
                        <label style="display:block; font-size:0.75rem; font-weight:600; color:#6b7280; text-transform:uppercase; margin-bottom:6px;">Filter Role</label>
                        <select id="filter-role" onchange="resetPageAndLoad()"
                                style="padding:10px 14px; border:1px solid #d1d5db; border-radius:10px; font-size:0.875rem; background:#fff; min-width:160px;">
                            <option value="">All Roles</option>
                            <option value="student">Student</option>
                            <option value="recruiter">Recruiter</option>
                            <option value="coordinator">Coordinator</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>

                    <div>
                        <label style="display:block; font-size:0.75rem; font-weight:600; color:#6b7280; text-transform:uppercase; margin-bottom:6px;">Filter Status</label>
                        <select id="filter-status" onchange="resetPageAndLoad()"
                                style="padding:10px 14px; border:1px solid #d1d5db; border-radius:10px; font-size:0.875rem; background:#fff; min-width:160px;">
                            <option value="">All Statuses</option>
                            <option value="1">Active Only</option>
                            <option value="0">Suspended Only</option>
                        </select>
                    </div>
                </div>

                <!-- Table -->
                <div style="overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse; text-align:left; font-size:0.875rem;">
                        <thead>
                            <tr style="border-bottom:2px solid #f3f4f6; color:#6b7280; font-weight:600;">
                                <th style="padding:12px 16px;">Email</th>
                                <th style="padding:12px 16px;">Phone</th>
                                <th style="padding:12px 16px;">Role</th>
                                <th style="padding:12px 16px;">Registered On</th>
                                <th style="padding:12px 16px;">Status</th>
                                <th style="padding:12px 16px; text-align:right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <tr>
                                <td colspan="6" style="text-align:center; padding:32px; color:#6b7280;">Loading system users...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination Footer -->
                <div style="display:flex; justify-content:between; align-items:center; margin-top:24px; border-top:1px solid #f3f4f6; padding-top:16px;">
                    <div style="font-size:0.875rem; color:#6b7280;" id="pagination-info">
                        Showing page 1 of 1
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button id="btn-prev" onclick="changePage(-1)"
                                style="padding:8px 16px; border:1px solid #d1d5db; border-radius:10px; font-size:0.875rem; font-weight:500; cursor:pointer; background:#fff;">
                            Previous
                        </button>
                        <button id="btn-next" onclick="changePage(1)"
                                style="padding:8px 16px; border:1px solid #d1d5db; border-radius:10px; font-size:0.875rem; font-weight:500; cursor:pointer; background:#fff;">
                            Next
                        </button>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<div id="loading-overlay" style="position:fixed; inset:0; z-index:50; background:rgba(255,255,255,0.85);
     display:flex; align-items:center; justify-content:center;">
    <div class="spinner" style="width:32px; height:32px; color:#8B2A8B;"></div>
</div>

<div id="toast-container" style="position:fixed; top:24px; right:24px; z-index:60; display:flex; flex-direction:column; gap:12px;"></div>

<!-- Add Coordinator Modal -->
<div id="coord-modal" style="display:none; position:fixed; inset:0; z-index:40; align-items:center; justify-content:center;">
    <div style="position:absolute; inset:0; background:rgba(0,0,0,0.5);" onclick="closeCoordinatorModal()"></div>
    <div class="panel-card fade-in" style="position:relative; width:100%; max-width:500px; padding:32px; background:#fff; z-index:41;">
        <h2 style="font-size:1.25rem; font-weight:700; margin-bottom:20px; color:#1f2937;">Add New Coordinator</h2>
        <form id="coord-form" onsubmit="submitCoordinator(event)" style="display:flex; flex-direction:column; gap:16px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div>
                    <label style="display:block; font-size:0.875rem; font-weight:500; color:#4b5563; margin-bottom:6px;">Full Name *</label>
                    <input type="text" id="coord-name" required style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:0.875rem;">
                </div>
                <div>
                    <label style="display:block; font-size:0.875rem; font-weight:500; color:#4b5563; margin-bottom:6px;">Email Address *</label>
                    <input type="email" id="coord-email" required placeholder="e.g. name@gmail.com" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:0.875rem;">
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div>
                    <label style="display:block; font-size:0.875rem; font-weight:500; color:#4b5563; margin-bottom:6px;">Phone Number</label>
                    <input type="text" id="coord-phone" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:0.875rem;">
                </div>
                <div>
                    <label style="display:block; font-size:0.875rem; font-weight:500; color:#4b5563; margin-bottom:6px;">Department Code</label>
                    <input type="text" id="coord-dept" placeholder="e.g. CSE" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:0.875rem;">
                </div>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div>
                    <label style="display:block; font-size:0.875rem; font-weight:500; color:#4b5563; margin-bottom:6px;">Designation</label>
                    <input type="text" id="coord-designation" placeholder="e.g. Faculty Coordinator" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:0.875rem;">
                </div>
                <div>
                    <label style="display:block; font-size:0.875rem; font-weight:500; color:#4b5563; margin-bottom:6px;">Team</label>
                    <input type="text" id="coord-team" placeholder="e.g. Placement Team" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:0.875rem;">
                </div>
            </div>

            <div>
                <label style="display:block; font-size:0.875rem; font-weight:500; color:#4b5563; margin-bottom:6px;">Coordinator Type</label>
                <select id="coord-type" style="width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:0.875rem; background:#fff;">
                    <option value="faculty">Faculty</option>
                    <option value="student">Student</option>
                </select>
            </div>

            <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:16px;">
                <button type="button" onclick="closeCoordinatorModal()" style="padding:10px 16px; border:1px solid #d1d5db; border-radius:10px; background:#fff; cursor:pointer;">Cancel</button>
                <button type="submit" class="btn-primary" style="width:auto; padding:10px 24px;">Create Coordinator</button>
            </div>
        </form>
    </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/components.js"></script>
<script>
    Auth.requireRole(['admin']);

    let currentPage = 1;
    const perPage = 15;

    document.addEventListener('DOMContentLoaded', async () => {
        const user = Auth.getUser();
        document.getElementById('sidebar-email').textContent = user?.email || '';
        document.getElementById('avatar').textContent = (user?.email?.[0] || 'A').toUpperCase();

        await loadUsers();
        document.getElementById('loading-overlay').style.display = 'none';
    });

    async function loadUsers() {
        const role = document.getElementById('filter-role').value;
        const status = document.getElementById('filter-status').value;

        let query = `?page=${currentPage}&per_page=${perPage}`;
        if (role) query += `&role=${role}`;
        if (status) query += `&is_active=${status}`;

        const res = await Api.get(`/admin/users${query}`);
        const tbody = document.getElementById('users-table-body');
        tbody.innerHTML = '';

        if (res.status === 'success') {
            const data = res.data;
            const meta = res.meta;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:32px; color:#6b7280;">No users matched the criteria.</td></tr>';
                document.getElementById('pagination-info').textContent = 'No records';
                document.getElementById('btn-prev').disabled = true;
                document.getElementById('btn-next').disabled = true;
                return;
            }

            data.forEach(u => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid #f3f4f6';

                const statusBadge = u.is_active
                    ? `<span style="display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:99px; background:#d1fae5; color:#065f46; font-size:0.75rem; font-weight:600;">Active</span>`
                    : `<span style="display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:99px; background:#fee2e2; color:#991b1b; font-size:0.75rem; font-weight:600;">Suspended</span>`;

                const actionButton = u.is_active
                    ? `<button onclick="toggleUserStatus('${u.user_id}', false)" style="padding:6px 12px; border-radius:8px; background:#fee2e2; color:#ef4444; border:1px solid #fca5a5; font-size:0.75rem; font-weight:600; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.background='#fecaca'" onmouseout="this.style.background='#fee2e2'">Suspend</button>`
                    : `<button onclick="toggleUserStatus('${u.user_id}', true)" style="padding:6px 12px; border-radius:8px; background:#d1fae5; color:#10b981; border:1px solid #6ee7b7; font-size:0.75rem; font-weight:600; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.background='#a7f3d0'" onmouseout="this.style.background='#d1fae5'">Activate</button>`;

                tr.innerHTML = `
                    <td style="padding:16px; font-weight:500; color:#111827;">${u.email}</td>
                    <td style="padding:16px; color:#4b5563;">${u.phone || '—'}</td>
                    <td style="padding:16px; font-weight:600; color:#8b2a8b; text-transform:capitalize;">${u.role_name}</td>
                    <td style="padding:16px; color:#6b7280;">${new Date(u.created_at).toLocaleDateString('en-IN')}</td>
                    <td style="padding:16px;">${statusBadge}</td>
                    <td style="padding:16px; text-align:right;">${actionButton}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('pagination-info').textContent = `Showing page ${meta.page} of ${meta.total_pages || 1} (Total: ${meta.total} users)`;
            document.getElementById('btn-prev').disabled = meta.page <= 1;
            document.getElementById('btn-next').disabled = meta.page >= meta.total_pages;

        } else {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:32px; color:#ef4444;">Failed to load user directories.</td></tr>';
        }
    }

    async function toggleUserStatus(userId, activate) {
        const actionLabel = activate ? 'activate' : 'suspend';
        if (!confirm(`Are you sure you want to ${actionLabel} this user's account?`)) {
            return;
        }

        document.getElementById('loading-overlay').style.display = 'flex';
        const res = await Api.put(`/admin/users/${userId}/status`, { is_active: activate });
        document.getElementById('loading-overlay').style.display = 'none';

        if (res.status === 'success') {
            Toast.success(`User account has been ${activate ? 'activated' : 'suspended'}.`);
            await loadUsers();
        } else {
            Toast.error(res.message || 'Failed to update user status.');
        }
    }

    function resetPageAndLoad() {
        currentPage = 1;
        loadUsers();
    }

    function changePage(direction) {
        currentPage += direction;
        loadUsers();
    }

    function openCoordinatorModal() {
        document.getElementById('coord-modal').style.display = 'flex';
        document.getElementById('coord-form').reset();
    }

    function closeCoordinatorModal() {
        document.getElementById('coord-modal').style.display = 'none';
    }

    async function submitCoordinator(e) {
        e.preventDefault();
        
        const payload = {
            name: document.getElementById('coord-name').value.trim(),
            email: document.getElementById('coord-email').value.trim(),
            phone: document.getElementById('coord-phone').value.trim(),
            dept_code: document.getElementById('coord-dept').value.trim() || 'CSE',
            designation: document.getElementById('coord-designation').value.trim() || 'Coordinator',
            team: document.getElementById('coord-team').value.trim() || 'Placement Team',
            coord_type: document.getElementById('coord-type').value
        };

        document.getElementById('loading-overlay').style.display = 'flex';
        const res = await Api.post('/admin/users/coordinator', payload);
        document.getElementById('loading-overlay').style.display = 'none';

        if (res.status === 'success') {
            Toast.success('Coordinator created successfully.');
            closeCoordinatorModal();
            resetPageAndLoad();
        } else {
            Toast.error(res.message || 'Failed to create coordinator.');
        }
    }
</script>

<div id="mobile-overlay" class="mobile-overlay" onclick="document.getElementById('sidebar').classList.remove('open'); this.classList.remove('open');"></div>
<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('mobile-overlay').classList.toggle('open');
    }
</script>

</body>
</html>
