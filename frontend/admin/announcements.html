<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcements — TNP Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/app.css">
    <style>
        #app-layout { display: flex; min-height: 100vh; }
        #sidebar     { width: 256px; flex-shrink: 0; }
        #main-area   { flex: 1; overflow-y: auto; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.4s ease-out both; }

        .nav-link { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:12px;
                    color:#4b5563; font-weight:500; font-size:0.875rem; text-decoration:none;
                    transition:all 0.2s; }
        .nav-link:hover { background:#f5f3ff; color:#8B2A8B; }
        .nav-link.active { background:#f5f3ff; color:#8B2A8B; font-weight:600; }

        .panel-card { background:#fff; border-radius:20px; border:1px solid #f3f4f6; padding:24px;
                      box-shadow:0 4px 6px -1px rgba(0,0,0,0.02); }

        .announcement-card { border-left:4px solid #d1d5db; transition:all 0.2s; }
        .announcement-card.urgent { border-left-color:#ef4444; background:#fef2f2; }
        .announcement-card.important { border-left-color:#f59e0b; background:#fffbeb; }
        .announcement-card.normal { border-left-color:#8b2a8b; background:#faf5ff; }
    </style>
</head>
<body style="background:#f9fafb; font-family:Inter,system-ui,sans-serif;">

<div id="app-layout">
    <!-- ═══ Sidebar ═══ -->
    <aside id="sidebar" style="background:#fff; border-right:1px solid #f3f4f6; display:flex; flex-direction:column;">
        <div style="padding:24px; border-bottom:1px solid #f3f4f6;">
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="../assets/img/iiitm-logo.png" alt="IIIT Manipur"
                     style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                <div>
                    <div style="font-size:0.875rem; font-weight:700; color:#1f2937;">TNP Portal</div>
                    <div style="font-size:0.75rem; color:#6b7280;">Admin Panel</div>
                </div>
            </div>
        </div>

        <nav style="flex:1; padding:16px; display:flex; flex-direction:column; gap:4px;">
            <a href="dashboard.html"           class="nav-link">📊 <span>Dashboard</span></a>
            <a href="sessions.html"            class="nav-link">🗓️ <span>Sessions</span></a>
            <a href="announcements.html"       class="nav-link active">📢 <span>Announcements</span></a>
            <a href="users.html"               class="nav-link">👥 <span>Users</span></a>
        </nav>

        <div style="padding:16px; border-top:1px solid #f3f4f6;">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                <div id="avatar" style="width:32px; height:32px; border-radius:50%; background:#f5f3ff;
                     display:flex; align-items:center; justify-content:center;
                     font-weight:700; font-size:0.875rem; color:#8B2A8B;">A</div>
                <div style="flex:1; min-width:0;">
                    <div id="sidebar-email" style="font-size:0.8125rem; font-weight:500; color:#1f2937;
                          white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
                    <div style="font-size:0.75rem; color:#6b7280;">Administrator</div>
                </div>
            </div>
            <button onclick="Auth.logout()"
                    style="width:100%; display:flex; align-items:center; gap:10px; padding:10px 16px;
                           border-radius:12px; background:none; border:none; cursor:pointer;
                           color:#ef4444; font-size:0.875rem; font-weight:500;
                           transition:background 0.2s;"
                    onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background='none'">
                🚪 <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ═══ Main ═══ -->
    <div id="main-area">
        <header style="background:#fff; border-bottom:1px solid #f3f4f6; padding:16px 32px;
                        display:flex; align-items:center; justify-content:between; position:sticky; top:0; z-index:10;">
            <h1 style="font-size:1.25rem; font-weight:600; color:#1f2937; margin:0;">TNP Announcements</h1>
        </header>

        <main style="padding:32px; max-width:1200px; margin:0 auto;" class="fade-in">
            <div style="display:grid; grid-template-columns:1fr 1.5fr; gap:32px;">
                
                <!-- Left: Form -->
                <div>
                    <div class="panel-card">
                        <h2 style="font-size:1.125rem; font-weight:600; color:#1f2937; margin-top:0; margin-bottom:20px;">Publish Notice</h2>
                        
                        <form id="announcement-form" style="display:flex; flex-direction:column; gap:16px;">
                            <div>
                                <label style="display:block; font-size:0.75rem; font-weight:600; color:#4b5563; text-transform:uppercase; margin-bottom:6px;">Title</label>
                                <input type="text" id="title" placeholder="Announcement Title" required
                                       style="width:100%; padding:10px 14px; border:1px solid #d1d5db; border-radius:10px; font-size:0.875rem;">
                            </div>
                            
                            <div>
                                <label style="display:block; font-size:0.75rem; font-weight:600; color:#4b5563; text-transform:uppercase; margin-bottom:6px;">Content Body</label>
                                <textarea id="body" placeholder="Write notice details here..." required rows="5"
                                          style="width:100%; padding:10px 14px; border:1px solid #d1d5db; border-radius:10px; font-size:0.875rem; font-family:inherit;"></textarea>
                            </div>

                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                                <div>
                                    <label style="display:block; font-size:0.75rem; font-weight:600; color:#4b5563; text-transform:uppercase; margin-bottom:6px;">Priority</label>
                                    <select id="priority" style="width:100%; padding:10px 14px; border:1px solid #d1d5db; border-radius:10px; font-size:0.875rem; background:#fff;">
                                        <option value="normal">Normal</option>
                                        <option value="important">Important</option>
                                        <option value="urgent">Urgent</option>
                                    </select>
                                </div>
                                <div>
                                    <label style="display:block; font-size:0.75rem; font-weight:600; color:#4b5563; text-transform:uppercase; margin-bottom:6px;">Audience Roles</label>
                                    <div style="display:flex; gap:16px; padding:10px 0;">
                                        <label style="display:flex; align-items:center; gap:6px; font-size:0.875rem; color:#4b5563;">
                                            <input type="checkbox" id="role-student" checked> Students
                                        </label>
                                        <label style="display:flex; align-items:center; gap:6px; font-size:0.875rem; color:#4b5563;">
                                            <input type="checkbox" id="role-recruiter"> Recruiters
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <hr style="border:none; border-top:1px solid #e5e7eb; margin:8px 0;">
                            <h3 style="margin:0 0 8px; font-size:0.8125rem; font-weight:600; color:#374151; text-transform:uppercase; letter-spacing:0.5px;">Advanced Targeting (Optional)</h3>
                            
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                                <div>
                                    <label style="display:block; font-size:0.75rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Branch Code (e.g. CSE)</label>
                                    <input type="text" id="target-branch" placeholder="All branches"
                                           style="width:100%; padding:8px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:0.8125rem;">
                                </div>
                                <div>
                                    <label style="display:block; font-size:0.75rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Graduation Year (e.g. 2027)</label>
                                    <input type="text" id="target-year" placeholder="All years"
                                           style="width:100%; padding:8px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:0.8125rem;">
                                </div>
                            </div>

                            <button type="submit"
                                    style="width:100%; padding:12px; background:linear-gradient(135deg, #8B2A8B, #C03854);
                                           border:none; border-radius:10px; color:#fff; font-weight:600; font-size:0.875rem;
                                           cursor:pointer; transition:opacity 0.2s; margin-top:12px;"
                                    onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
                                Post Announcement
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Right: List -->
                <div>
                    <div class="panel-card" style="display:flex; flex-direction:column; gap:20px;">
                        <h2 style="font-size:1.125rem; font-weight:600; color:#1f2937; margin:0;">Active Notices</h2>
                        
                        <div id="announcements-list" style="display:flex; flex-direction:column; gap:16px; max-height:650px; overflow-y:auto; padding-right:4px;">
                            <div style="text-align:center; padding:32px; color:#6b7280;">Loading announcements...</div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>
</div>

<div id="loading-overlay" style="position:fixed; inset:0; z-index:50; background:rgba(255,255,255,0.85);
     display:flex; align-items:center; justify-content:center;">
    <div class="spinner" style="width:32px; height:32px; color:#8B2A8B;"></div>
</div>

<div id="toast-container" style="position:fixed; top:24px; right:24px; z-index:60; display:flex; flex-direction:column; gap:12px;"></div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/components.js"></script>
<script>
    Auth.requireRole(['admin']);

    document.addEventListener('DOMContentLoaded', async () => {
        const user = Auth.getUser();
        document.getElementById('sidebar-email').textContent = user?.email || '';
        document.getElementById('avatar').textContent = (user?.email?.[0] || 'A').toUpperCase();

        await loadAnnouncements();
        document.getElementById('loading-overlay').style.display = 'none';

        // Submit form
        document.getElementById('announcement-form').addEventListener('submit', handleCreateAnnouncement);
    });

    async function loadAnnouncements() {
        const res = await Api.get('/admin/announcements');
        const listDiv = document.getElementById('announcements-list');
        listDiv.innerHTML = '';

        if (res.status === 'success') {
            if (res.data.length === 0) {
                listDiv.innerHTML = '<div style="text-align:center; padding:32px; color:#6b7280;">No active announcements.</div>';
                return;
            }

            res.data.forEach(ann => {
                const card = document.createElement('div');
                card.className = `announcement-card ${ann.priority} panel-card`;
                card.style.display = 'flex';
                card.style.flexDirection = 'column';
                card.style.gap = '12px';
                card.style.padding = '16px 20px';

                // Badges
                const pColor = ann.priority === 'urgent' ? '#ef4444' : (ann.priority === 'important' ? '#d97706' : '#8b2a8b');
                const pBg = ann.priority === 'urgent' ? '#fef2f2' : (ann.priority === 'important' ? '#fffbeb' : '#faf5ff');
                const priorityBadge = `<span style="padding:2px 8px; border-radius:99px; background:${pBg}; color:${pColor}; font-size:0.75rem; font-weight:600; text-transform:uppercase;">${ann.priority}</span>`;

                // Visible targets representation
                let targetText = '';
                if (ann.targets && ann.targets.length > 0) {
                    targetText = ann.targets.map(t => `<span style="padding:2px 6px; border-radius:4px; background:#e5e7eb; color:#4b5563; font-size:0.75rem;">${t.target_type}: ${t.target_value}</span>`).join(' ');
                }

                card.innerHTML = `
                    <div style="display:flex; justify-content:between; align-items:start; gap:16px;">
                        <div>
                            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:4px;">
                                ${priorityBadge}
                                <span style="font-size:0.75rem; color:#6b7280;">${new Date(ann.created_at).toLocaleString('en-IN')}</span>
                            </div>
                            <h3 style="margin:0; font-size:1rem; font-weight:700; color:#111827;">${ann.title}</h3>
                        </div>
                        <button onclick="deleteAnnouncement('${ann.announcement_id}')"
                                style="background:none; border:none; color:#ef4444; font-size:1.125rem; cursor:pointer; padding:4px;"
                                title="Delete announcement">🗑️</button>
                    </div>
                    <p style="margin:0; font-size:0.875rem; color:#4b5563; white-space:pre-line; line-height:1.5;">${ann.body}</p>
                    <div style="display:flex; gap:8px; flex-wrap:wrap; border-top:1px solid rgba(0,0,0,0.05); padding-top:10px;">
                        <span style="font-size:0.75rem; color:#6b7280; display:flex; align-items:center; gap:4px;">
                            👥 Roles: ${ann.visible_to_roles.join(', ')}
                        </span>
                        ${targetText}
                    </div>
                `;
                listDiv.appendChild(card);
            });
        } else {
            listDiv.innerHTML = '<div style="text-align:center; padding:32px; color:#ef4444;">Failed to load announcements.</div>';
        }
    }

    async function handleCreateAnnouncement(e) {
        e.preventDefault();
        
        const roles = [];
        if (document.getElementById('role-student').checked) roles.push('student');
        if (document.getElementById('role-recruiter').checked) roles.push('recruiter');

        if (roles.length === 0) {
            Toast.error('Please select at least one audience role (Students or Recruiters).');
            return;
        }

        const targets = [];
        const branchVal = document.getElementById('target-branch').value.trim();
        const yearVal = document.getElementById('target-year').value.trim();

        if (branchVal) targets.push({ type: 'branch', value: branchVal });
        if (yearVal) targets.push({ type: 'year', value: yearVal });

        const payload = {
            title: document.getElementById('title').value.trim(),
            body: document.getElementById('body').value.trim(),
            priority: document.getElementById('priority').value,
            visible_to_roles: roles,
            targets: targets,
            status: 'published'
        };

        document.getElementById('loading-overlay').style.display = 'flex';
        const res = await Api.post('/admin/announcements', payload);
        document.getElementById('loading-overlay').style.display = 'none';

        if (res.status === 'success') {
            Toast.success('Announcement published successfully.');
            document.getElementById('announcement-form').reset();
            // restore default checkbox
            document.getElementById('role-student').checked = true;
            document.getElementById('role-recruiter').checked = false;
            await loadAnnouncements();
        } else {
            Toast.error(res.message || 'Failed to post announcement.');
        }
    }

    async function deleteAnnouncement(announcementId) {
        if (!confirm('Are you sure you want to delete this announcement? This action cannot be undone.')) {
            return;
        }

        document.getElementById('loading-overlay').style.display = 'flex';
        const res = await Api.delete(`/admin/announcements/${announcementId}`);
        document.getElementById('loading-overlay').style.display = 'none';

        if (res.status === 'success') {
            Toast.success('Announcement deleted.');
            await loadAnnouncements();
        } else {
            Toast.error(res.message || 'Failed to delete announcement.');
        }
    }
</script>
</body>
</html>
