<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Applications — TNP Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/app.css">
    <style>
        /* Layout */
        #app-layout { display: flex; min-height: 100vh; }
        #sidebar     { width: 256px; flex-shrink: 0; }
        #main-area   { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.4s ease-out both; }

        .nav-link { display:flex; align-items:center; gap:12px; padding:10px 16px; border-radius:12px;
                    color:#4b5563; font-weight:500; font-size:0.875rem; text-decoration:none;
                    transition:all 0.2s; }
        .nav-link:hover { background:#fdf2f8; color:#8B2A8B; }
        .nav-link.active { background:#fdf2f8; color:#8B2A8B; font-weight:600; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th { text-align: left; padding: 12px 16px; border-bottom: 2px solid #e5e7eb; color: #6b7280; font-size: 0.8125rem; font-weight: 600; text-transform: uppercase; }
        td { padding: 16px; border-bottom: 1px solid #f3f4f6; color: #374151; font-size: 0.875rem; }
        tr:last-child td { border-bottom: none; }
        .badge { padding: 4px 8px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
    </style>
</head>
<body style="background:#f9fafb; font-family:Inter,system-ui,sans-serif;">

<div id="app-layout">
    <!-- Sidebar -->
    <aside id="sidebar" style="background:#fff; border-right:1px solid #f3f4f6; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto;">
        <div style="padding:24px; border-bottom:1px solid #f3f4f6;">
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="../assets/img/iiitm-logo.png" alt="IIIT Manipur" style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                <div>
                    <div style="font-size:0.875rem; font-weight:700; color:#1f2937;">TNP Portal</div>
                    <div style="font-size:0.75rem; color:#6b7280;">Recruiter Dashboard</div>
                </div>
            </div>
        </div>
        <nav style="flex:1; padding:16px; display:flex; flex-direction:column; gap:4px;">
            <a href="profile.html"    class="nav-link">🏢 <span>Company Profile</span></a>
            <a href="post-job.html"   class="nav-link">📝 <span>Post a Job</span></a>
            <a href="my-jobs.html"    class="nav-link active">📊 <span>My Postings</span></a>
        </nav>
        <div style="padding:16px; border-top:1px solid #f3f4f6;">
            <button onclick="Auth.logout()" style="width:100%; display:flex; align-items:center; gap:10px; padding:10px 16px; border-radius:12px; background:none; border:none; cursor:pointer; color:#ef4444; font-size:0.875rem; font-weight:500; transition:background 0.2s;" onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background='none'">
                🚪 <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main -->
    <div id="main-area">
        <header style="background:#fff; border-bottom:1px solid #f3f4f6; padding:16px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10;">
            <div style="display:flex; align-items:center; gap:16px;">
                <a href="my-jobs.html" style="color:#6b7280; text-decoration:none; font-size:1.25rem;">←</a>
                <h1 style="font-size:1.25rem; font-weight:600; color:#1f2937; margin:0;" id="job-title">Job Applications</h1>
            </div>
            <button class="btn-secondary" style="width:auto; padding:8px 16px; font-size:0.875rem;">Download CSV</button>
        </header>

        <main style="padding:32px; max-width:1100px; margin:0 auto; width:100%;">
            <div class="card fade-in" style="padding:0; overflow:hidden;">
                <div style="overflow-x:auto;">
                    <table id="applications-table">
                        <thead>
                            <tr>
                                <th>Student</th>
                                <th>Roll No</th>
                                <th>Department</th>
                                <th>CPI</th>
                                <th>Applied On</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="applications-body">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
                
                <div id="empty-state" style="display:none; text-align:center; padding:60px 20px;">
                    <div style="font-size:3rem; margin-bottom:16px;">📄</div>
                    <h3 style="font-size:1.125rem; font-weight:600; color:#1f2937; margin:0 0 8px;">No Applications Yet</h3>
                    <p style="color:#6b7280; font-size:0.875rem; margin:0;">Students haven't applied to this job yet.</p>
                </div>
            </div>
            
            <div id="pagination" style="display:none; justify-content:center; gap:8px; margin-top:24px;">
                <button id="prev-btn" onclick="changePage(-1)" class="btn-secondary" style="width:auto; padding:6px 16px; font-size:0.875rem;">← Prev</button>
                <span id="page-info" style="padding:6px 12px; font-size:0.875rem; color:#4b5563;"></span>
                <button id="next-btn" onclick="changePage(1)" class="btn-secondary" style="width:auto; padding:6px 16px; font-size:0.875rem;">Next →</button>
            </div>
        </main>
    </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay" style="position:fixed; inset:0; z-index:50; background:rgba(255,255,255,0.85); display:flex; align-items:center; justify-content:center;">
    <div class="spinner" style="width:32px; height:32px; color:#8B2A8B;"></div>
</div>
<!-- Toast container -->
<div id="toast-container" style="position:fixed; top:24px; right:24px; z-index:60; display:flex; flex-direction:column; gap:12px;"></div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/components.js"></script>
<script>
    Auth.requireRole(['recruiter']);
    
    const urlParams = new URLSearchParams(window.location.search);
    const jobId = urlParams.get('id');
    
    let currentPage = 1;
    let totalPages = 1;

    document.addEventListener('DOMContentLoaded', async () => {
        if (!jobId) {
            window.location.href = 'my-jobs.html';
            return;
        }
        
        const user = Auth.getUser();
        document.getElementById('sidebar-email').textContent = user?.email || '';
        
        await loadJobDetails();
        await loadApplications(1);
    });

    async function loadJobDetails() {
        const res = await Api.get(`/jobs/${jobId}`);
        if (res.status === 'success') {
            document.getElementById('job-title').textContent = res.data.title + ' — Applications';
        }
    }

    async function loadApplications(page) {
        document.getElementById('loading-overlay').style.display = 'flex';
        const res = await Api.get(`/recruiters/me/jobs/${jobId}/applications`, { page, per_page: 20 });
        document.getElementById('loading-overlay').style.display = 'none';

        if (res.status !== 'success') { Toast.error('Failed to load applications'); return; }
        
        currentPage = res.meta.page;
        totalPages = res.meta.total_pages || 1;
        
        renderApplications(res.data);
        renderPagination();
    }

    function renderApplications(apps) {
        const tbody = document.getElementById('applications-body');
        const table = document.getElementById('applications-table');
        const emptyState = document.getElementById('empty-state');
        
        if (apps.length === 0) {
            table.style.display = 'none';
            emptyState.style.display = 'block';
            return;
        }
        
        table.style.display = 'table';
        emptyState.style.display = 'none';
        
        const statusColors = {
            applied:        'background:#f3f4f6; color:#4b5563',
            shortlisted:    'background:#dbeafe; color:#1e40af',
            in_process:     'background:#fef3c7; color:#92400e',
            selected:       'background:#d1fae5; color:#065f46',
            not_selected:   'background:#fee2e2; color:#b91c1c',
            offer_accepted: 'background:#d1fae5; color:#065f46',
            offer_declined: 'background:#fee2e2; color:#b91c1c'
        };

        tbody.innerHTML = apps.map(app => `
            <tr>
                <td>
                    <div style="font-weight:500;">${app.student_name}</div>
                    <div style="font-size:0.75rem; color:#6b7280;">${app.student_email}</div>
                </td>
                <td>${app.roll_no}</td>
                <td>${app.department_name || 'N/A'}</td>
                <td style="font-weight:600;">${app.cpi || 'N/A'}</td>
                <td>${new Date(app.applied_at).toLocaleDateString()}</td>
                <td>
                    <span class="badge" style="${statusColors[app.status] || statusColors.applied}">
                        ${app.status.replace('_', ' ').toUpperCase()}
                    </span>
                </td>
                <td>
                    ${app.resume_url ? 
                        `<a href="${app.resume_url}" target="_blank" class="btn-secondary" style="padding:4px 12px; font-size:0.75rem; text-decoration:none; display:inline-block;">View Resume</a>` 
                        : `<span style="font-size:0.75rem; color:#9ca3af;">No Resume</span>`
                    }
                </td>
            </tr>
        `).join('');
    }

    function renderPagination() {
        const pag = document.getElementById('pagination');
        if (totalPages > 1) {
            pag.style.display = 'flex';
            document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages;
        } else {
            pag.style.display = 'none';
        }
    }

    function changePage(delta) {
        const newPage = currentPage + delta;
        if (newPage >= 1 && newPage <= totalPages) loadApplications(newPage);
    }
</script>
</body>
</html>
