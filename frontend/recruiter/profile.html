<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Profile — TNP Portal</title>
    <meta name="description" content="Manage your recruiter profile on the IIIT Manipur Placement Portal.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/app.css">
    <style>
        /* Layout: fixed sidebar + scrollable main */
        #app-layout { display: flex; min-height: 100vh; }
        #sidebar     { width: 256px; flex-shrink: 0; }
        #main-area   { flex: 1; overflow-y: auto; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.4s ease-out both; }

        /* Sidebar nav link */
        .nav-link { display:flex; align-items:center; gap:12px; padding:10px 16px; border-radius:12px;
                    color:#4b5563; font-weight:500; font-size:0.875rem; text-decoration:none;
                    transition:all 0.2s; }
        .nav-link:hover { background:#fdf2f8; color:#8B2A8B; }
        .nav-link.active { background:#fdf2f8; color:#8B2A8B; font-weight:600; }

        /* Grid for form fields */
        .field-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        @media(max-width:640px){ .field-grid { grid-template-columns:1fr; } }
        .field-full { grid-column: 1 / -1; }
    </style>
</head>
<body style="background:#f9fafb; font-family:Inter,system-ui,sans-serif;">

<div id="app-layout">
    <!-- ═══ Sidebar ═══ -->
    <aside id="sidebar" style="background:#fff; border-right:1px solid #f3f4f6; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto;">
        <!-- Logo -->
        <div style="padding:24px; border-bottom:1px solid #f3f4f6;">
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="../assets/img/iiitm-logo.png" alt="IIIT Manipur"
                     style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                <div>
                    <div style="font-size:0.875rem; font-weight:700; color:#1f2937;">TNP Portal</div>
                    <div style="font-size:0.75rem; color:#6b7280;">Recruiter Dashboard</div>
                </div>
            </div>
        </div>

        <!-- Nav -->
        <nav style="flex:1; padding:16px; display:flex; flex-direction:column; gap:4px;">
            <a href="profile.html"    class="nav-link active">🏢 <span>Company Profile</span></a>
            <a href="post-job.html"   class="nav-link">📝 <span>Post a Job</span></a>
            <a href="my-jobs.html"    class="nav-link">📊 <span>My Postings</span></a>
        </nav>

        <!-- User footer -->
        <div style="padding:16px; border-top:1px solid #f3f4f6;">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                <div id="avatar" style="width:32px; height:32px; border-radius:50%; background:#fce7f3;
                     display:flex; align-items:center; justify-content:center;
                     font-weight:700; font-size:0.875rem; color:#8B2A8B;">?</div>
                <div style="flex:1; min-width:0;">
                    <div id="sidebar-email" style="font-size:0.8125rem; font-weight:500; color:#1f2937;
                         white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
                    <div style="font-size:0.75rem; color:#6b7280;">Recruiter</div>
                </div>
            </div>
            <button onclick="Auth.logout()"
                    style="width:100%; display:flex; align-items:center; gap:10px; padding:10px 16px;
                           border-radius:12px; background:none; border:none; cursor:pointer;
                           color:#ef4444; font-size:0.875rem; font-weight:500;
                           transition:background 0.2s;"
                    onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background='none'">
                🚪 <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ═══ Main ═══ -->
    <div id="main-area">
        <!-- Header -->
        <header style="background:#fff; border-bottom:1px solid #f3f4f6; padding:16px 32px;
                        display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10;">
            <h1 style="font-size:1.25rem; font-weight:600; color:#1f2937; margin:0;">Company Profile</h1>
            <span id="today-date" style="font-size:0.875rem; color:#9ca3af; margin-left:auto;"></span>
        </header>

        <main style="padding:32px; max-width:900px; margin:0 auto;">

            <!-- Status Banner -->
            <div id="account-status-banner" style="margin-bottom:24px; padding:16px 20px; border-radius:16px; display:none; align-items:center; gap:16px;">
                <span id="account-status-icon" style="font-size:1.5rem;"></span>
                <div style="flex:1;">
                    <p id="account-status-title" style="font-weight:600; margin:0 0 4px;"></p>
                    <p id="account-status-text" style="font-size:0.875rem; margin:0;"></p>
                </div>
            </div>

            <!-- ─── Company Details ─── -->
            <div class="card fade-in" style="margin-bottom:20px;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
                    <h2 style="font-size:1rem; font-weight:600; color:#1f2937; margin:0;">Company Details</h2>
                    <button onclick="saveCompany()" class="btn-primary" style="width:auto; padding:8px 20px; font-size:0.875rem;">Save</button>
                </div>
                <div class="field-grid">
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Company Name</label>
                        <input type="text" id="c-name" class="input-field" placeholder="E.g. Acme Corp">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Website</label>
                        <input type="url" id="c-website" class="input-field" placeholder="https://example.com">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Industry</label>
                        <input type="text" id="c-industry" class="input-field" placeholder="E.g. Software, Finance">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Company Size</label>
                        <select id="c-size" class="input-field">
                            <option value="">Select size</option>
                            <option value="1-50">1-50 employees</option>
                            <option value="51-200">51-200 employees</option>
                            <option value="201-500">201-500 employees</option>
                            <option value="501-1000">501-1000 employees</option>
                            <option value="1000+">1000+ employees</option>
                        </select>
                    </div>
                    <div class="field-full">
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">HQ Location</label>
                        <input type="text" id="c-hq_location" class="input-field" placeholder="E.g. Bangalore, India">
                    </div>
                    <div class="field-full">
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Company Logo URL</label>
                        <input type="url" id="c-logo_url" class="input-field" placeholder="https://example.com/logo.png">
                    </div>
                    <div class="field-full">
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">About Company</label>
                        <textarea id="c-about" class="input-field" rows="3" placeholder="Brief description of the company..."></textarea>
                    </div>
                </div>
            </div>

            <!-- ─── Primary Contact ─── -->
            <div class="card fade-in" style="margin-bottom:20px; animation-delay:0.1s;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
                    <h2 style="font-size:1rem; font-weight:600; color:#1f2937; margin:0;">Primary Contact (You)</h2>
                    <button onclick="saveContact()" class="btn-primary" style="width:auto; padding:8px 20px; font-size:0.875rem;">Save</button>
                </div>
                <div class="field-grid">
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Full Name</label>
                        <input type="text" id="p-primary_name" class="input-field">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Position / Title</label>
                        <input type="text" id="p-primary_position" class="input-field" placeholder="E.g. HR Manager">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Phone</label>
                        <input type="tel" id="p-primary_phone" class="input-field">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">LinkedIn Profile URL</label>
                        <input type="url" id="p-primary_linkedin" class="input-field" placeholder="https://linkedin.com/in/...">
                    </div>
                </div>
            </div>
            
            <!-- ─── Alternate Contact ─── -->
            <div class="card fade-in" style="margin-bottom:20px; animation-delay:0.2s;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
                    <h2 style="font-size:1rem; font-weight:600; color:#1f2937; margin:0;">Alternate Contact (Optional)</h2>
                    <button onclick="saveContact()" class="btn-primary" style="width:auto; padding:8px 20px; font-size:0.875rem;">Save</button>
                </div>
                <div class="field-grid">
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Full Name</label>
                        <input type="text" id="p-alt_name" class="input-field">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Position / Title</label>
                        <input type="text" id="p-alt_position" class="input-field">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Email</label>
                        <input type="email" id="p-alt_email" class="input-field">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Phone</label>
                        <input type="tel" id="p-alt_phone" class="input-field">
                    </div>
                    <div>
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">LinkedIn Profile URL</label>
                        <input type="url" id="p-alt_linkedin" class="input-field">
                    </div>
                    <div class="field-full">
                        <label style="display:block; font-size:0.8125rem; font-weight:500; color:#6b7280; margin-bottom:6px;">Additional Remarks</label>
                        <textarea id="p-remark" class="input-field" rows="2" placeholder="Any additional notes for the placement cell..."></textarea>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- Loading overlay -->
<div id="loading-overlay" style="position:fixed; inset:0; z-index:50; background:rgba(255,255,255,0.85);
     display:flex; align-items:center; justify-content:center;">
    <div class="spinner" style="width:32px; height:32px; color:#8B2A8B;"></div>
</div>

<!-- Toast container -->
<div id="toast-container" style="position:fixed; top:24px; right:24px; z-index:60; display:flex; flex-direction:column; gap:12px;"></div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/components.js"></script>
<script>
    Auth.requireRole(['recruiter']);

    // ─── Init ────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
        const user = Auth.getUser();
        document.getElementById('sidebar-email').textContent = user?.email || '';
        document.getElementById('avatar').textContent = (user?.email?.[0] || '?').toUpperCase();
        document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-IN',
            { weekday:'long', year:'numeric', month:'short', day:'numeric' });

        await loadProfile();
        document.getElementById('loading-overlay').style.display = 'none';
    });

    let profileData = {};

    // ─── Load Profile ────────────────────────────────────────────────────────
    async function loadProfile() {
        const res = await Api.get('/recruiters/me');
        if (res.status !== 'success') { Toast.error('Failed to load profile.'); return; }
        profileData = res.data;
        populateForm(profileData);
        updateStatusBanner(profileData);
    }

    // ─── Populate form ────────────────────────────────────────────────────────
    function populateForm(data) {
        // Contact Fields
        const contactFields = ['primary_name','primary_position','primary_phone','primary_linkedin',
                               'alt_name','alt_position','alt_email','alt_phone','alt_linkedin', 'remark'];
        contactFields.forEach(f => {
            const el = document.getElementById(`p-${f}`);
            if (el && data[f] !== null && data[f] !== undefined) el.value = data[f];
        });

        // Company Fields
        const companyFields = ['name','logo_url','website','industry','size','about','hq_location'];
        if (data.company) {
            companyFields.forEach(f => {
                const el = document.getElementById(`c-${f}`);
                if (el && data.company[f]) el.value = data.company[f];
            });
        }
    }

    // ─── Save Contact ─────────────────────────────────────────────────────────
    async function saveContact() {
        const contactFields = ['primary_name','primary_position','primary_phone','primary_linkedin',
                               'alt_name','alt_position','alt_email','alt_phone','alt_linkedin', 'remark'];
        const payload = {};
        contactFields.forEach(f => {
            const el = document.getElementById(`p-${f}`);
            if (el) payload[f] = el.value || null;
        });

        const res = await Api.put('/recruiters/me/contact', payload);
        res.status === 'success'
            ? Toast.success(res.message || 'Contact updated!')
            : Toast.error(res.message || 'Save failed.');
    }

    // ─── Save Company ─────────────────────────────────────────────────────────
    async function saveCompany() {
        const companyFields = ['name','logo_url','website','industry','size','about','hq_location'];
        const payload = {};
        companyFields.forEach(f => {
            const el = document.getElementById(`c-${f}`);
            if (el) payload[f] = el.value || null;
        });

        const res = await Api.put('/recruiters/me/company', payload);
        res.status === 'success'
            ? Toast.success(res.message || 'Company updated!')
            : Toast.error(res.message || 'Save failed.');
    }

    // ─── Status banner ────────────────────────────────────────────────────
    function updateStatusBanner(data) {
        const banner = document.getElementById('account-status-banner');
        const icon = document.getElementById('account-status-icon');
        const title = document.getElementById('account-status-title');
        const text = document.getElementById('account-status-text');

        banner.style.display = 'flex';
        
        if (data.account_activated == 1) {
            banner.style.background = '#d1fae5'; // emerald-100
            banner.style.border = '1px solid #a7f3d0';
            icon.textContent = '✅';
            title.textContent = 'Account Verified';
            title.style.color = '#065f46';
            text.textContent = 'Your company profile is verified. You can post jobs.';
            text.style.color = '#047857';
        } else {
            banner.style.background = '#fef3c7'; // amber-100
            banner.style.border = '1px solid #fde68a';
            icon.textContent = '⏳';
            title.textContent = 'Account Pending Verification';
            title.style.color = '#92400e';
            text.textContent = 'Please complete your company profile. The coordinator will verify your account shortly.';
            text.style.color = '#b45309';
        }
    }
</script>
</body>
</html>
