<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Students — TNP Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/app.css">
    <style>
        #app-layout { display: flex; min-height: 100vh; }
        #sidebar     { width: 256px; flex-shrink: 0; }
        #main-area   { flex: 1; overflow-y: auto; }

        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.4s ease-out both; }

        .nav-link { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:12px;
                    color:#4b5563; font-weight:500; font-size:0.875rem; text-decoration:none;
                    transition:all 0.2s; }
        .nav-link:hover { background:#fdf2f8; color:#8B2A8B; }
        .nav-link.active { background:#fdf2f8; color:#8B2A8B; font-weight:600; }

        /* Modern Table styling */
        .table-card { background:#fff; border-radius:16px; border:1px solid #f3f4f6; overflow:hidden; }
        table { width:100%; border-collapse:collapse; text-align:left; }
        th { background:#f9fafb; padding:16px 24px; font-size:0.75rem; font-weight:600; color:#4b5563; text-transform:uppercase; border-bottom:1px solid #f3f4f6; }
        td { padding:16px 24px; font-size:0.875rem; color:#1f2937; border-bottom:1px solid #f3f4f6; }
        tr:hover { background:#faf5ff; }

        /* Badge design */
        .badge { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:99px; font-size:0.75rem; font-weight:600; }
        .badge-pending { background:#e0f2fe; color:#0369a1; }
        .badge-verified { background:#d1fae5; color:#065f46; }
        .badge-rejected { background:#fde8e8; color:#9b1c1c; }
        .badge-resubmit { background:#fef3c7; color:#92400e; }
        .badge-draft { background:#f3f4f6; color:#4b5563; }

        /* Modal Side Panel */
        .side-panel-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:40; display:none; justify-content:flex-end; }
        .side-panel { width:700px; max-width:90vw; background:#fff; height:100%; box-shadow:-10px 0 25px -5px rgba(0,0,0,0.1); display:flex; flex-direction:column;
                      transform:translateX(100%); transition:transform 0.3s ease-out; }
        .side-panel.open { transform:translateX(0); }

        /* Accordion Styles */
        details.checklist-item { border:1px solid #e5e7eb; border-radius:12px; margin-bottom:12px; background:#fff; overflow:hidden; transition:all 0.2s; }
        details.checklist-item[open] { border-color:#8B2A8B; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05); }
        summary.checklist-header { padding:16px; font-weight:600; color:#374151; cursor:pointer; list-style:none; display:flex; justify-content:space-between; align-items:center; background:#f9fafb; transition:background 0.2s; }
        summary.checklist-header:hover { background:#f3f4f6; }
        summary.checklist-header::after { content:'▼'; font-size:0.75rem; color:#9ca3af; transition:transform 0.2s; }
        details.checklist-item[open] summary.checklist-header::after { transform:rotate(180deg); }
        .checklist-content { padding:16px; border-top:1px solid #e5e7eb; display:flex; flex-direction:column; gap:16px; }
        
        .radio-group { display:flex; gap:12px; margin-top:8px; }
        .radio-btn { padding:8px 16px; border:1px solid #d1d5db; border-radius:8px; cursor:pointer; font-size:0.875rem; font-weight:500; display:flex; align-items:center; gap:6px; color:#4b5563; transition:all 0.2s; }
        .radio-btn input { display:none; }
        .radio-btn.approved { border-color:#10b981; background:#d1fae5; color:#065f46; }
        .radio-btn.rejected { border-color:#ef4444; background:#fee2e2; color:#991b1b; }
    </style>
</head>
<body style="background:#f9fafb; font-family:Inter,system-ui,sans-serif;">

<div id="app-layout">
    <!-- ═══ Sidebar ═══ -->
    <aside id="sidebar" style="background:#fff; border-right:1px solid #f3f4f6; display:flex; flex-direction:column;">
        <div style="padding:24px; border-bottom:1px solid #f3f4f6;">
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="../assets/img/iiitm-logo.png" alt="IIIT Manipur"
                     style="width:40px; height:40px; border-radius:50%; object-fit:cover;">
                <div>
                    <div style="font-size:0.875rem; font-weight:700; color:#1f2937;">TNP Portal</div>
                    <div style="font-size:0.75rem; color:#6b7280;">Coordinator Panel</div>
                </div>
            </div>
        </div>

        <nav style="flex:1; padding:16px; display:flex; flex-direction:column; gap:4px;">
            <a href="dashboard.html"           class="nav-link">📊 <span>Dashboard</span></a>
            <a href="verify-students.html"     class="nav-link active">👤 <span>Verify Students</span></a>
            <a href="verify-recruiters.html"   class="nav-link">🏢 <span>Verify Recruiters</span></a>
            <a href="verify-jobs.html"         class="nav-link">💼 <span>Verify Jobs</span></a>
        </nav>

        <div style="padding:16px; border-top:1px solid #f3f4f6;">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                <div id="avatar" style="width:32px; height:32px; border-radius:50%; background:#fce7f3;
                     display:flex; align-items:center; justify-content:center;
                     font-weight:700; font-size:0.875rem; color:#8B2A8B;">?</div>
                <div style="flex:1; min-width:0;">
                    <div id="sidebar-email" style="font-size:0.8125rem; font-weight:500; color:#1f2937;
                          white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
                    <div style="font-size:0.75rem; color:#6b7280;">Coordinator</div>
                </div>
            </div>
            <button onclick="Auth.logout()"
                    style="width:100%; display:flex; align-items:center; gap:10px; padding:10px 16px;
                           border-radius:12px; background:none; border:none; cursor:pointer;
                           color:#ef4444; font-size:0.875rem; font-weight:500;
                           transition:background 0.2s;"
                    onmouseover="this.style.background='#fef2f2'" onmouseout="this.style.background='none'">
                🚪 <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ═══ Main ═══ -->
    <div id="main-area">
        <header style="background:#fff; border-bottom:1px solid #f3f4f6; padding:16px 32px;
                        display:flex; align-items:center; justify-content:between; position:sticky; top:0; z-index:10;">
            <h1 style="font-size:1.25rem; font-weight:600; color:#1f2937; margin:0;">Student Verification</h1>
            <span id="today-date" style="font-size:0.875rem; color:#9ca3af; margin-left:auto;"></span>
        </header>

        <main style="padding:32px; max-width:1200px; margin:0 auto;">

            <!-- Filters -->
            <div style="display:flex; gap:16px; margin-bottom:24px; align-items:center;">
                <select id="filter-status" onchange="loadVerifications()" class="input-field" style="width:200px; margin:0;">
                    <option value="">All Statuses</option>
                    <option value="pending" selected>Pending Verification</option>
                    <option value="verified">Verified</option>
                    <option value="resubmit">Resubmit Requested</option>
                    <option value="rejected">Rejected</option>
                </select>
                <div style="margin-left:auto; display:flex; gap:8px;">
                    <span style="font-size:0.875rem; color:#6b7280;" id="records-count">Found 0 records</span>
                </div>
            </div>

            <!-- Table Card -->
            <div class="table-card fade-in">
                <table>
                    <thead>
                        <tr>
                            <th>Student Details</th>
                            <th>Roll Number</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body">
                        <tr>
                            <td colspan="5" style="text-align:center; padding:40px; color:#6b7280;">Loading student verifications...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>
</div>

<!-- Side Panel for Verification Details -->
<div id="panel-overlay" class="side-panel-overlay" onclick="closePanel(event)">
    <div class="side-panel" onclick="event.stopPropagation()">
        <!-- Header -->
        <div style="padding:24px; border-bottom:1px solid #f3f4f6; display:flex; align-items:center; justify-content:space-between; background:#fff;">
            <h3 style="margin:0; font-size:1.125rem; font-weight:600; color:#1f2937;">Verify Student Profile</h3>
            <button onclick="hidePanel()" style="background:none; border:none; font-size:1.5rem; cursor:pointer; color:#9ca3af;">&times;</button>
        </div>

        <!-- Scrollable details body -->
        <div style="flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:24px; background:#f9fafb;">
            
            <!-- Student Banner -->
            <div style="display:flex; align-items:center; gap:16px; background:#fff; padding:16px; border-radius:12px; border:1px solid #e5e7eb;">
                <div id="panel-avatar" style="width:56px; height:56px; border-radius:50%; background:#fce7f3;
                     display:flex; align-items:center; justify-content:center;
                     font-weight:700; font-size:1.5rem; color:#8B2A8B; flex-shrink:0;">?</div>
                <div style="flex:1;">
                    <h4 id="panel-name" style="margin:0 0 4px; font-size:1.125rem; font-weight:600; color:#1f2937;">Name</h4>
                    <span id="panel-roll" style="font-size:0.875rem; color:#6b7280;">Roll Number</span>
                </div>
            </div>

            <!-- Dynamic Expandable Checklist -->
            <div>
                <h4 style="font-size:0.875rem; font-weight:600; color:#6b7280; text-transform:uppercase; margin-bottom:12px; letter-spacing:0.5px;">Verification Checklist</h4>
                <div id="checklist-container">
                    <!-- Javascript will populate this -->
                </div>
            </div>

            <!-- Overall Remarks -->
            <div style="background:#fff; padding:16px; border-radius:12px; border:1px solid #e5e7eb;">
                <label style="font-size:0.875rem; color:#374151; font-weight:600; display:block; margin-bottom:8px;">Additional Overall Remarks</label>
                <textarea id="panel-remark" class="input-field" style="height:80px; resize:none; margin:0;" placeholder="General notes (optional)..."></textarea>
            </div>

            <!-- Logs / History -->
            <div style="background:#fff; padding:16px; border-radius:12px; border:1px solid #e5e7eb;">
                <label style="font-size:0.875rem; color:#374151; font-weight:600; display:block; margin-bottom:12px;">Verification History</label>
                <div id="panel-logs" style="display:flex; flex-direction:column; gap:10px; font-size:0.8125rem;"></div>
            </div>
        </div>

        <!-- Footer Buttons -->
        <div style="padding:20px 24px; border-top:1px solid #f3f4f6; display:flex; justify-content:flex-end; gap:12px; background:#fff;">
            <button onclick="hidePanel()" style="padding:10px 16px; border:1px solid #d1d5db; border-radius:10px; background:#fff; font-weight:500; cursor:pointer;">Cancel</button>
            <button onclick="submitChecklist()" class="btn-primary" style="width:auto; padding:10px 24px; background:#8B2A8B;">Submit Verification</button>
        </div>
    </div>
</div>

<div id="loading-overlay" style="position:fixed; inset:0; z-index:50; background:rgba(255,255,255,0.85);
     display:flex; align-items:center; justify-content:center;">
    <div class="spinner" style="width:32px; height:32px; color:#8B2A8B;"></div>
</div>

<div id="toast-container" style="position:fixed; top:24px; right:24px; z-index:60; display:flex; flex-direction:column; gap:12px;"></div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/components.js"></script>
<script>
    Auth.requireRole(['coordinator', 'admin']);

    let activeVerificationId = null;

    document.addEventListener('DOMContentLoaded', async () => {
        const user = Auth.getUser();
        document.getElementById('sidebar-email').textContent = user?.email || '';
        document.getElementById('avatar').textContent = (user?.email?.[0] || '?').toUpperCase();
        document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-IN',
            { weekday:'long', year:'numeric', month:'short', day:'numeric' });

        await loadVerifications();
        document.getElementById('loading-overlay').style.display = 'none';
    });

    async function loadVerifications() {
        const status = document.getElementById('filter-status').value;
        const params = { entity_type: 'student' };
        if (status) params.status = status;

        const res = await Api.get('/verifications', params);
        const tbody = document.getElementById('student-table-body');
        tbody.innerHTML = '';

        if (res.status === 'success') {
            document.getElementById('records-count').textContent = `Found ${res.data.length} records`;

            if (res.data.length > 0) {
                res.data.forEach(item => {
                    const tr = document.createElement('tr');
                    let badgeClass = 'badge-draft';
                    if (item.status === 'pending') badgeClass = 'badge-pending';
                    else if (item.status === 'verified') badgeClass = 'badge-verified';
                    else if (item.status === 'rejected') badgeClass = 'badge-rejected';
                    else if (item.status === 'resubmit') badgeClass = 'badge-resubmit';

                    tr.innerHTML = `
                        <td style="font-weight:600; color:#1f2937;">${item.entity_name || 'No Name'}</td>
                        <td style="color:#4b5563;">${item.entity_subtitle || '-'}</td>
                        <td style="color:#6b7280;">${item.entity_email || '-'}</td>
                        <td><span class="badge ${badgeClass}">${item.status.toUpperCase()}</span></td>
                        <td>
                            <button onclick="viewDetails('${item.verification_id}')" class="btn-primary" 
                                    style="width:auto; padding:6px 16px; font-size:0.75rem; background:#8B2A8B;">
                                Review
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px; color:#6b7280;">No verifications match selected filters.</td></tr>`;
            }
        } else {
            Toast.error('Failed to load verifications.');
        }
    }

    const VERIFICATION_CONFIG = [
        { id: 'acad_10', label: '10th Academics', docs: ['10th_marksheet'], fields: ['board_10th', 'passing_year_10th', 'percentage_10th'] },
        { id: 'acad_12', label: '12th/Diploma Academics', docs: ['12th_marksheet', 'diploma_marksheet'], fields: ['board_12th', 'passing_year_12th', 'percentage_12th'] },
        { id: 'acad_degree', label: 'B.Tech Details', docs: ['semester_grade_cards'], fields: ['department_name', 'cpi', 'current_semester'] },
        { id: 'category', label: 'Category & PwD', docs: ['category_certificate', 'pwd_certificate', 'ews_certificate'], fields: ['category', 'is_pwd'] },
        { id: 'resume', label: 'Resume', docs: ['resume'], fields: [] }
    ];

    async function viewDetails(id) {
        document.getElementById('loading-overlay').style.display = 'flex';
        const res = await Api.get(`/verifications/${id}`);
        document.getElementById('loading-overlay').style.display = 'none';

        if (res.status !== 'success') {
            Toast.error('Could not fetch verification details.');
            return;
        }

        activeVerificationId = id;
        const details = res.data.entity_details;
        const verif = res.data.verification;

        document.getElementById('panel-name').textContent = details.name || 'No Name';
        document.getElementById('panel-roll').textContent = details.roll_no || '-';
        document.getElementById('panel-avatar').textContent = (details.name?.[0] || '?').toUpperCase();
        document.getElementById('panel-remark').value = verif.remark || '';

        // Parse JSONs safely
        const docs = typeof details.documents_json === 'string' ? (JSON.parse(details.documents_json) || {}) : (details.documents_json || {});
        const edu = typeof details.education_json === 'string' ? (JSON.parse(details.education_json) || {}) : (details.education_json || {});
        
        // Merge edu and basic details for easy lookup
        const mergedData = { ...details, ...edu };

        const checklistContainer = document.getElementById('checklist-container');
        checklistContainer.innerHTML = '';

        VERIFICATION_CONFIG.forEach(config => {
            // Check if any docs or fields exist for this category to avoid empty useless accordions
            let hasDocs = false;
            let docsHtml = '';
            config.docs.forEach(docKey => {
                if (docs[docKey]) {
                    hasDocs = true;
                    docsHtml += `<a href="${docs[docKey]}" target="_blank" style="display:inline-flex; align-items:center; gap:6px; background:#f3f4f6; padding:8px 12px; border-radius:8px; font-size:0.8125rem; color:#4b5563; text-decoration:none; font-weight:500;"><svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg> View ${docKey.replace(/_/g, ' ').toUpperCase()}</a>`;
                }
            });

            let fieldsHtml = '';
            config.fields.forEach(fieldKey => {
                const val = mergedData[fieldKey];
                if (val !== undefined && val !== null && val !== '') {
                    fieldsHtml += `<div style="background:#f9fafb; padding:10px 14px; border-radius:8px; border:1px solid #f3f4f6;">
                        <span style="display:block; font-size:0.7rem; text-transform:uppercase; color:#6b7280; font-weight:600; margin-bottom:2px;">${fieldKey.replace(/_/g, ' ')}</span>
                        <span style="font-size:0.875rem; color:#1f2937; font-weight:500;">${val}</span>
                    </div>`;
                }
            });

            // If completely empty, skip rendering this section (e.g. general category has no docs)
            if (!hasDocs && fieldsHtml === '') return;

            const itemHtml = `
                <details class="checklist-item" id="chk-${config.id}">
                    <summary class="checklist-header">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span id="badge-${config.id}" style="width:12px; height:12px; border-radius:50%; background:#d1d5db; display:inline-block;"></span>
                            ${config.label}
                        </div>
                    </summary>
                    <div class="checklist-content">
                        ${fieldsHtml ? `<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:12px; margin-bottom:8px;">${fieldsHtml}</div>` : ''}
                        ${docsHtml ? `<div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:12px;">${docsHtml}</div>` : ''}
                        
                        <div style="border-top:1px solid #e5e7eb; padding-top:12px; margin-top:4px;">
                            <label style="font-size:0.8125rem; font-weight:600; color:#374151;">Status</label>
                            <div class="radio-group">
                                <label class="radio-btn" onclick="selectStatus('${config.id}', 'approved', this)">
                                    <input type="radio" name="status_${config.id}" value="approved">
                                    👍 Approve
                                </label>
                                <label class="radio-btn" onclick="selectStatus('${config.id}', 'rejected', this)">
                                    <input type="radio" name="status_${config.id}" value="rejected">
                                    👎 Reject
                                </label>
                            </div>
                            <div id="remark-box-${config.id}" style="display:none; margin-top:12px;">
                                <input type="text" id="remark-input-${config.id}" placeholder="Specify issue (e.g., document blurry, mismatch...)" style="width:100%; padding:8px 12px; border:1px solid #ef4444; border-radius:8px; font-size:0.8125rem; outline:none;">
                            </div>
                        </div>
                    </div>
                </details>
            `;
            checklistContainer.insertAdjacentHTML('beforeend', itemHtml);
        });

        if (checklistContainer.innerHTML === '') {
            checklistContainer.innerHTML = '<div style="color:#6b7280; font-size:0.875rem; font-style:italic;">No trackable documents or data found for this profile.</div>';
        }

        // Render audit logs
        const logsContainer = document.getElementById('panel-logs');
        logsContainer.innerHTML = '';
        if (res.data.logs && res.data.logs.length > 0) {
            res.data.logs.forEach(log => {
                const logItem = document.createElement('div');
                logItem.style.cssText = 'border-left:2px solid #e5e7eb; padding-left:12px; margin-bottom:8px;';
                const formattedDate = new Date(log.changed_at).toLocaleString('en-IN', {
                    day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
                });
                logItem.innerHTML = `
                    <div style="font-weight:600; color:#374151;">
                        ${log.from_status ? log.from_status.toUpperCase() : 'INIT'} &rarr; ${log.to_status.toUpperCase()}
                    </div>
                    <div style="color:#6b7280; font-size:0.75rem; margin-top:2px;">
                        By ${log.changed_by_email || 'System'} on ${formattedDate}
                    </div>
                `;
                logsContainer.appendChild(logItem);
            });
        } else {
            logsContainer.innerHTML = '<div style="color:#9ca3af; font-style:italic;">No logs available.</div>';
        }

        // Show panel
        const overlay = document.getElementById('panel-overlay');
        overlay.style.display = 'flex';
        setTimeout(() => {
            overlay.querySelector('.side-panel').classList.add('open');
            // Auto-expand first item
            const firstItem = document.querySelector('details.checklist-item');
            if(firstItem) firstItem.open = true;
        }, 50);
    }

    function selectStatus(id, status, labelElement) {
        // Reset classes for siblings
        const siblings = labelElement.parentElement.querySelectorAll('.radio-btn');
        siblings.forEach(el => {
            el.classList.remove('approved', 'rejected');
        });
        
        // Add class to selected
        labelElement.classList.add(status);
        
        // Update badge
        const badge = document.getElementById(`badge-${id}`);
        badge.style.background = status === 'approved' ? '#10b981' : '#ef4444';

        // Toggle remark box
        const remarkBox = document.getElementById(`remark-box-${id}`);
        if (status === 'rejected') {
            remarkBox.style.display = 'block';
            document.getElementById(`remark-input-${id}`).focus();
        } else {
            remarkBox.style.display = 'none';
        }
    }

    function hidePanel() {
        const overlay = document.getElementById('panel-overlay');
        overlay.querySelector('.side-panel').classList.remove('open');
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 300);
    }

    function closePanel(e) {
        if (e.target === document.getElementById('panel-overlay')) {
            hidePanel();
        }
    }

    async function submitChecklist() {
        if (!activeVerificationId) return;

        let allApproved = true;
        let compiledRemarks = [];
        let missingSelection = false;

        // Loop through all rendered checklist items
        const items = document.querySelectorAll('details.checklist-item');
        if (items.length === 0) {
            // Edge case: empty profile
            compiledRemarks.push("Profile lacks necessary data for verification.");
            allApproved = false;
        } else {
            items.forEach(detailsEl => {
                const id = detailsEl.id.replace('chk-', '');
                const label = detailsEl.querySelector('.checklist-header').innerText.replace('▼','').trim();
                const approvedRadio = detailsEl.querySelector(`input[value="approved"]`);
                const rejectedRadio = detailsEl.querySelector(`input[value="rejected"]`);

                if (approvedRadio.checked) {
                    // All good
                } else if (rejectedRadio.checked) {
                    allApproved = false;
                    const specificReason = document.getElementById(`remark-input-${id}`).value.trim();
                    compiledRemarks.push(`- [${label}]: ${specificReason || 'Needs revision'}`);
                } else {
                    missingSelection = true;
                }
            });
        }

        if (missingSelection) {
            Toast.error('Please make an Approve/Reject decision for every section.');
            return;
        }

        const generalRemark = document.getElementById('panel-remark').value.trim();
        if (generalRemark) {
            compiledRemarks.push(`- [General]: ${generalRemark}`);
        }

        const finalStatus = allApproved ? 'verified' : 'resubmit';
        const finalRemarkString = compiledRemarks.join('\n');

        document.getElementById('loading-overlay').style.display = 'flex';
        const res = await Api.put(`/verifications/${activeVerificationId}`, {
            status: finalStatus,
            remark: finalRemarkString
        });
        document.getElementById('loading-overlay').style.display = 'none';

        if (res.status === 'success') {
            Toast.success(`Profile has been marked as ${finalStatus.toUpperCase()}.`);
            hidePanel();
            await loadVerifications();
        } else {
            Toast.error(res.message || 'Failed to update verification.');
        }
    }
</script>
</body>
</html>
