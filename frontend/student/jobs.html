<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Openings — TNP Portal</title>
    <meta name="description" content="Browse eligible job openings on the IIIT Manipur Placement Portal.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/app.css">
    <style>
        @keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .job-card { animation: fadeInUp 0.4s ease-out both; }
        .job-card:hover .apply-btn { opacity: 1; transform: translateY(0); }
        .apply-btn { opacity: 0; transform: translateY(4px); transition: all 0.2s ease; }
    
        @media (max-width: 768px) {
            #sidebar { position: fixed !important; left: -256px; transition: left 0.3s ease; z-index: 100; height: 100vh; box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
            #sidebar.open { left: 0; }
            #mobile-menu-btn { display: block !important; }
            .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
            .mobile-overlay.open { display: block; }
            header { padding: 16px !important; }
            main { padding: 16px !important; }
            .field-grid { grid-template-columns: 1fr !important; }
        }

    </style>
</head>
<body style="background:#f9fafb; font-family:Inter,system-ui,sans-serif;">

<div style="display:flex; min-height:100vh;">
    <!-- Sidebar -->
    <aside style="width:256px; flex-shrink:0; background:#fff; border-right:1px solid #f3f4f6;
                  display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto;">
        <div style="padding:24px; border-bottom:1px solid #f3f4f6;">
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="../assets/img/iiitm-logo.png" alt="IIIT Manipur"
                     style="width:40px;height:40px;border-radius:50%;object-fit:cover;">
                <div>
                    <div style="font-size:0.875rem;font-weight:700;color:#1f2937;">TNP Portal</div>
                    <div style="font-size:0.75rem;color:#6b7280;">Student Dashboard</div>
                </div>
            </div>
        </div>
        <nav style="flex:1;padding:16px;display:flex;flex-direction:column;gap:4px;">
            <a href="profile.html"      style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:12px;color:#4b5563;font-weight:500;font-size:0.875rem;text-decoration:none;transition:background 0.2s;" onmouseover="this.style.background='#fdf2f8';this.style.color='#8B2A8B'" onmouseout="this.style.background='none';this.style.color='#4b5563'">👤 My Profile</a>
            <a href="jobs.html"         style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:12px;background:#fdf2f8;color:#8B2A8B;font-weight:600;font-size:0.875rem;text-decoration:none;">💼 Job Openings</a>
            <a href="applications.html" style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:12px;color:#4b5563;font-weight:500;font-size:0.875rem;text-decoration:none;transition:background 0.2s;" onmouseover="this.style.background='#fdf2f8';this.style.color='#8B2A8B'" onmouseout="this.style.background='none';this.style.color='#4b5563'">📋 My Applications</a>
        </nav>
        <div style="padding:16px;border-top:1px solid #f3f4f6;">
            <button onclick="Auth.logout()" style="width:100%;display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:12px;background:none;border:none;cursor:pointer;color:#ef4444;font-size:0.875rem;font-weight:500;">🚪 Logout</button>
        </div>
    </aside>

    <!-- Main -->
    <div style="flex:1;overflow-y:auto;display:flex;flex-direction:column;">

        <!-- Header -->
        <header style="background:#fff;border-bottom:1px solid #f3f4f6;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;">
            <div style="display:flex; align-items:center;">
                <button id="mobile-menu-btn" style="display:none; background:none; border:none; font-size:1.5rem; cursor:pointer; margin-right:16px; padding:0;" onclick="toggleSidebar()">☰</button>
                <h1 style="font-size:1.25rem;font-weight:600;color:#1f2937;margin:0;">Job Openings</h1>
            </div>
            <span style="font-size:0.875rem;color:#9ca3af;">Browse eligible positions</span>
        </header>

        <main style="flex:1;overflow-y:auto;padding:24px 32px;">

            <!-- Search + Filter bar -->
            <div class="flex flex-col sm:flex-row gap-3 mb-6">
                <div class="flex-1 relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
                    <input type="text" id="search-input" placeholder="Search companies or roles..."
                           class="input-field pl-10" oninput="debounceLoad()">
                </div>
                <select id="type-filter" class="input-field sm:w-48" onchange="loadJobs()">
                    <option value="">All types</option>
                    <option value="FTE">Full-time</option>
                    <option value="INTERN">Internship</option>
                    <option value="PPO">PPO</option>
                </select>
            </div>

            <!-- Stats bar -->
            <div class="grid grid-cols-3 gap-4 mb-6">
                <div class="card !p-4 text-center">
                    <p id="stat-total" class="text-2xl font-bold text-brand-700">—</p>
                    <p class="text-xs text-gray-500 mt-1">Eligible Jobs</p>
                </div>
                <div class="card !p-4 text-center">
                    <p id="stat-page" class="text-2xl font-bold text-gray-700">—</p>
                    <p class="text-xs text-gray-500 mt-1">Showing</p>
                </div>
                <div class="card !p-4 text-center">
                    <p id="stat-pages" class="text-2xl font-bold text-gray-700">—</p>
                    <p class="text-xs text-gray-500 mt-1">Pages</p>
                </div>
            </div>

            <!-- Job Cards Grid -->
            <div id="jobs-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>

            <!-- Empty state -->
            <div id="empty-state" class="hidden text-center py-20">
                <div class="text-6xl mb-4">💼</div>
                <h3 class="text-xl font-semibold text-gray-700">No eligible jobs right now</h3>
                <p class="text-gray-500 mt-2">Complete your profile and check back when a placement session is active.</p>
                <a href="profile.html" class="inline-block mt-4 btn-primary !w-auto !px-6">Complete Profile</a>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="hidden flex items-center justify-center gap-2 mt-8">
                <button id="prev-btn" onclick="changePage(-1)"
                        class="px-4 py-2 rounded-xl border border-gray-200 text-sm font-medium text-gray-600
                               hover:bg-gray-50 disabled:opacity-40 transition-colors">← Previous</button>
                <span id="page-info" class="px-4 py-2 text-sm text-gray-600"></span>
                <button id="next-btn" onclick="changePage(1)"
                        class="px-4 py-2 rounded-xl border border-gray-200 text-sm font-medium text-gray-600
                               hover:bg-gray-50 disabled:opacity-40 transition-colors">Next →</button>
            </div>
        </main>
    </div>
</div>

<!-- ─── Job Detail Modal ─── -->
<div id="job-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal()"></div>
    <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <div class="p-8" id="modal-content"></div>
    </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/components.js"></script>
<script>
    Auth.requireRole(['student']);

    let currentPage  = 1;
    let totalPages   = 1;
    let debounceTimer = null;

    document.addEventListener('DOMContentLoaded', () => {
        Components.renderSidebar('student', 'jobs');
        Components.renderHeader('Job Openings');
        loadJobs();
    });

    // ─── Load jobs ────────────────────────────────────────────────────────────
    async function loadJobs(page = 1) {
        currentPage = page;
        Components.showLoading();

        const params = { page, per_page: 12 };
        const res    = await Api.get('/jobs', params);
        Components.hideLoading();

        if (res.status !== 'success') {
            Toast.error(res.message || 'Failed to load jobs.');
            return;
        }

        const jobs = res.data || [];
        const meta = res.meta || {};
        totalPages  = meta.total_pages || 1;

        document.getElementById('stat-total').textContent = meta.total ?? 0;
        document.getElementById('stat-page').textContent  = jobs.length;
        document.getElementById('stat-pages').textContent = totalPages;
        document.getElementById('page-info').textContent  = `Page ${currentPage} of ${totalPages}`;
        document.getElementById('prev-btn').disabled = currentPage <= 1;
        document.getElementById('next-btn').disabled = currentPage >= totalPages;

        const grid = document.getElementById('jobs-grid');
        const empty = document.getElementById('empty-state');
        const pagination = document.getElementById('pagination');

        if (jobs.length === 0) {
            grid.innerHTML = '';
            empty.classList.remove('hidden');
            pagination.classList.add('hidden');
            return;
        }

        empty.classList.add('hidden');
        pagination.classList.toggle('hidden', totalPages <= 1);

        grid.innerHTML = jobs.map((job, i) => renderJobCard(job, i)).join('');
    }

    // ─── Render job card ──────────────────────────────────────────────────────
    function renderJobCard(job, index) {
        const company   = job.company_name || 'Unknown Company';
        const logo      = job.company_logo_url;
        const ctc       = job.ctc_lpa ? `₹${job.ctc_lpa} LPA` : (job.stipend_pm ? `₹${job.stipend_pm}/mo` : 'Undisclosed');
        const deadline  = job.apply_end ? new Date(job.apply_end).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'}) : 'Open';
        const daysLeft  = job.apply_end ? Math.max(0, Math.ceil((new Date(job.apply_end) - new Date()) / 86400000)) : null;
        const urgency   = daysLeft !== null && daysLeft <= 3 ? 'text-red-500 font-semibold' : 'text-gray-500';
        const delay     = `animation-delay:${index * 0.05}s`;

        return `
        <div class="job-card card cursor-pointer group relative overflow-hidden" style="${delay}"
             onclick="openJobModal('${job.job_id}')">
            <!-- Top accent -->
            <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-brand-700 to-brand-500 rounded-t-2xl"></div>

            <div class="pt-3">
                <!-- Company header -->
                <div class="flex items-start gap-3 mb-4">
                    <div class="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center flex-shrink-0 overflow-hidden">
                        ${logo ? `<img src="${logo}" alt="${company}" class="w-full h-full object-contain">` : `<span class="text-xl">🏢</span>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-semibold text-gray-800 truncate">${job.title}</h3>
                        <p class="text-sm text-gray-500 truncate">${company}</p>
                    </div>
                    ${job.job_type_label ? `<span class="badge badge-info flex-shrink-0">${job.job_type_label}</span>` : ''}
                </div>

                <!-- Details -->
                <div class="space-y-2 mb-4">
                    <div class="flex items-center gap-2 text-sm">
                        <span class="text-green-600 font-semibold">${ctc}</span>
                    </div>
                    ${job.location ? `<div class="flex items-center gap-2 text-sm text-gray-500">📍 ${job.location}</div>` : ''}
                    ${job.min_cpi ? `<div class="flex items-center gap-2 text-sm text-gray-500">📊 Min CPI: ${job.min_cpi}</div>` : ''}
                </div>

                <!-- Footer -->
                <div class="flex items-center justify-between pt-3 border-t border-gray-100">
                    <div class="text-xs ${urgency}">
                        ${daysLeft !== null ? (daysLeft === 0 ? '⚡ Closes today' : `⏰ ${daysLeft} days left`) : `📅 ${deadline}`}
                    </div>
                    <span class="text-xs text-gray-400">${job.applications_count ?? 0} applied</span>
                </div>

                <!-- Apply button (shows on hover) -->
                <button class="apply-btn mt-3 w-full py-2 rounded-xl bg-brand-700 text-white text-sm font-medium
                               hover:bg-brand-800 transition-colors"
                        onclick="event.stopPropagation(); quickApply('${job.job_id}')">
                    Apply Now →
                </button>
            </div>
        </div>`;
    }

    // ─── Open job detail modal ────────────────────────────────────────────────
    async function openJobModal(jobId) {
        document.getElementById('job-modal').classList.remove('hidden');
        document.getElementById('modal-content').innerHTML = '<div class="flex justify-center py-16"><div class="spinner w-8 h-8 text-brand-700"></div></div>';

        const res = await Api.get(`/jobs/${jobId}`);
        if (res.status !== 'success') {
            document.getElementById('modal-content').innerHTML = '<p class="text-red-500 text-center py-8">Failed to load job details.</p>';
            return;
        }

        const job = res.data;
        const company = job.company_name || 'Unknown Company';
        const ctc     = job.ctc_lpa ? `₹${job.ctc_lpa} LPA` : (job.stipend_pm ? `₹${job.stipend_pm}/mo` : 'Undisclosed');

        document.getElementById('modal-content').innerHTML = `
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-700 text-2xl">✕</button>

            <div class="flex items-start gap-4 mb-6">
                <div class="w-16 h-16 rounded-2xl bg-gray-100 flex items-center justify-center overflow-hidden flex-shrink-0">
                    ${job.company_logo_url ? `<img src="${job.company_logo_url}" class="w-full h-full object-contain">` : '<span class="text-3xl">🏢</span>'}
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">${job.title}</h2>
                    <p class="text-gray-500 mt-1">${company} ${job.company_website ? `• <a href="${job.company_website}" target="_blank" class="text-brand-700 hover:underline">Website</a>` : ''}</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-gray-50 rounded-xl p-4">
                    <p class="text-xs text-gray-500">Compensation</p>
                    <p class="font-semibold text-green-600 mt-1">${ctc}</p>
                </div>
                <div class="bg-gray-50 rounded-xl p-4">
                    <p class="text-xs text-gray-500">Location</p>
                    <p class="font-semibold text-gray-800 mt-1">${job.location || 'Not specified'}</p>
                </div>
                <div class="bg-gray-50 rounded-xl p-4">
                    <p class="text-xs text-gray-500">Min CPI Required</p>
                    <p class="font-semibold text-gray-800 mt-1">${job.min_cpi || 'No minimum'}</p>
                </div>
                <div class="bg-gray-50 rounded-xl p-4">
                    <p class="text-xs text-gray-500">Apply By</p>
                    <p class="font-semibold text-gray-800 mt-1">${job.apply_end ? new Date(job.apply_end).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : 'Open'}</p>
                </div>
            </div>

            ${job.description ? `
            <div class="mb-6">
                <h3 class="font-semibold text-gray-800 mb-2">Job Description</h3>
                <div class="text-sm text-gray-600 leading-relaxed prose max-w-none">${job.description}</div>
            </div>` : ''}

            ${job.rounds && job.rounds.length ? `
            <div class="mb-6">
                <h3 class="font-semibold text-gray-800 mb-3">Selection Rounds</h3>
                <div class="space-y-2">
                    ${job.rounds.map(r => `
                    <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl">
                        <span class="w-7 h-7 rounded-full bg-brand-100 text-brand-700 text-xs font-bold flex items-center justify-center flex-shrink-0">${r.round_number}</span>
                        <span class="text-sm font-medium text-gray-700">${r.round_type_label || 'Round'}</span>
                        ${r.scheduled_at ? `<span class="ml-auto text-xs text-gray-500">${new Date(r.scheduled_at).toLocaleDateString('en-IN')}</span>` : ''}
                    </div>`).join('')}
                </div>
            </div>` : ''}

            <button onclick="quickApply('${job.job_id}')" id="modal-apply-btn"
                    class="btn-primary mt-2">Apply for this Position →</button>
        `;
    }

    // ─── Quick apply ──────────────────────────────────────────────────────────
    async function quickApply(jobId) {
        const btn = document.getElementById('modal-apply-btn');
        if (btn) btn.disabled = true;

        const res = await Api.post('/applications', { job_id: jobId });

        if (res.status === 'success') {
            Toast.success('Application submitted successfully!');
            closeModal();
            loadJobs(currentPage);
        } else {
            Toast.error(res.message || 'Application failed.');
            if (btn) btn.disabled = false;
        }
    }

    function closeModal() { document.getElementById('job-modal').classList.add('hidden'); }
    function changePage(dir) { if (currentPage + dir >= 1 && currentPage + dir <= totalPages) loadJobs(currentPage + dir); }
    function debounceLoad() { clearTimeout(debounceTimer); debounceTimer = setTimeout(() => loadJobs(1), 400); }
</script>

<div id="mobile-overlay" class="mobile-overlay" onclick="document.getElementById('sidebar').classList.remove('open'); this.classList.remove('open');"></div>
<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('mobile-overlay').classList.toggle('open');
    }
</script>

</body>
</html>
